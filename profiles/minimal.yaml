# Co-actor 최소 프로파일
# 이 파일을 복사하여 나만의 동료 에이전트를 만들어 보세요.
# 또는 co-actor init 으로 대화형 생성도 가능합니다.

identity:
  name: "에이전트 이름"
  role: "이 에이전트의 역할을 한 문장으로"
  permanent_promises:
    - predicate: "사용자의 최종 판단을 대체하지 않는다"
      rationale: "동료는 관찰을 공유하되 결정은 대행하지 않는다"

sources:
  - name: identity
    role: identity
    type: builtin
    config: {}
  - name: conversation
    role: realtime
    type: builtin
    config: {}
  # 기억을 추가하려면:
  # - name: memory
  #   role: memory
  #   type: builtin
  #   config:
  #     nodes_path: profiles/sample_data/my-agent.json

agent_simulator:
  model: "gemini-3-flash-preview"
  temperature: 0.7
  # system_prompt: |
  #   에이전트의 시스템 프롬프트를 여기에 작성한다.
